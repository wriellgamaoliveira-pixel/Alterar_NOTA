name: Deploy Codex to GitHub Pages

on:
  push:
    branches: [codex/create-dashboard-for-financial-data]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/create-dashboard-for-financial-data

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install       # ← mudança crucial
      - run: npm run build

      # Commitar o build na própria branch
      - name: Deploy build to branch root
        run: |
          cp -r dist/* .
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy build" || echo "No changes to commit"
          git push
