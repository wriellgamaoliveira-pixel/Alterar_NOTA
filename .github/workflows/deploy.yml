name: Deploy to GitHub Pages

on:
  push:
    branches:
      - codex/create-dashboard-for-financial-data   # ⬅️ sua branch principal

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Move build to docs folder
        run: |
          rm -rf docs
          mv dist docs
          # Isso cria a pasta docs com os arquivos do build

      - name: Commit and push docs to the same branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs -f
          git commit -m "Deploy docs folder for GitHub Pages" || echo "No changes to commit"
          git push
