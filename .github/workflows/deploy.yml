name: Deploy Codex to GitHub Pages

on:
  push:
    branches: [codex/create-dashboard-for-financial-data]

permissions:
  contents: write   # para commitar o build na própria branch, se preferir
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/create-dashboard-for-financial-data

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      # Opção A: commitar o build na própria branch (sobrescrevendo a raiz)
      - name: Deploy build to branch root
        run: |
          cp -r dist/* .
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy build" || echo "No changes to commit"
          git push

      # Opção B (recomendado): usar ambiente de GitHub Pages com Actions
      # mas aí você teria que mudar a fonte do Pages para "GitHub Actions"
