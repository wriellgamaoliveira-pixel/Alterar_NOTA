<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Apuração</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#f0f4f8;--p:#1a73e8;--h1:#1a3c5e;--h2:#1a6e8e;--ok:#0d904f;--bad:#d93025;--w:#fff}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:#102a43}
    .wrap{max-width:1500px;margin:auto;padding:16px}.hidden{display:none}
    .header{position:sticky;top:0;z-index:10;background:linear-gradient(90deg,var(--h1),var(--h2));color:#fff;padding:14px 16px;box-shadow:0 2px 8px #0003}
    .btn{border:0;background:var(--p);color:#fff;padding:10px 14px;border-radius:10px;cursor:pointer}.btn:hover{filter:brightness(.95)}
    .upload{background:#fff;border:2px dashed var(--p);padding:28px;border-radius:14px;text-align:center;cursor:pointer}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.grow{flex:1}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
    .card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 8px #0001;border-left:4px solid var(--p)}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{background:#d9e8fb;border:0;padding:8px 12px;border-radius:8px;cursor:pointer}.tab.active{background:var(--p);color:#fff}
    table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:8px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:13px}th{background:var(--h1);color:#fff;position:sticky;top:0}tr:nth-child(even){background:#f8fafc}
    .table-wrap{overflow:auto;max-height:420px;border-radius:10px;box-shadow:0 1px 6px #0001}
    .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:12px}.panel{background:#fff;padding:12px;border-radius:12px;box-shadow:0 2px 8px #0001}
    .dd{position:relative}.dd-list{position:absolute;background:#fff;width:100%;max-height:240px;overflow:auto;box-shadow:0 10px 20px #0002;border-radius:10px;z-index:20}
    .dd-item{padding:8px;cursor:pointer}.dd-item:hover{background:#eef5ff}.badge{background:#e7eef8;border-radius:999px;padding:3px 8px;font-size:12px}
    .toast{position:fixed;right:14px;top:14px;background:#0f172a;color:#fff;padding:10px 12px;border-radius:8px;display:none}
    .tag{background:#eef5ff;padding:6px 8px;border-radius:999px;font-size:12px}
  </style>
</head>
<body>
<div class="header"><div class="wrap row"><div class="grow"><h2 style="margin:0">Dashboard de Apuração</h2><small>Sistema de Análise Financeira e Tributária</small></div><button class="btn" onclick="resetAll()">Reiniciar</button><button class="btn" onclick="document.getElementById('fileInput').click()">Carregar Arquivo(s)</button></div></div>
<div class="wrap">
  <input id="fileInput" type="file" accept=".htm,.html,.txt" multiple class="hidden" onchange="handleFileSelect(event)">
  <label id="uploadArea" class="upload"><div>📤 Arraste e solte arquivos .HTM ou clique para selecionar</div></label>
  <div id="fileTags" class="row" style="margin-top:8px"></div><div id="infoBar" style="margin:8px 0"></div>

  <div id="dashboard" class="hidden">
    <div class="row">
      <div class="dd grow"><input id="companySearch" class="grow" placeholder="🔎 Buscar empresa por nome ou código" oninput="onCompanySearch()" style="width:100%;padding:10px;border-radius:10px;border:1px solid #cbd5e1"><div id="companyList" class="dd-list hidden"></div></div>
      <button class="btn" onclick="setViewMode('individual')">Individual</button><button class="btn" onclick="setViewMode('consolidado')">Consolidado</button>
      <span id="metaRegime" class="badge">Regime: N/D</span><span id="metaEstado" class="badge">Estado: N/D</span><span id="metaSistema" class="badge">Sistema: N/D</span>
    </div>

    <div class="cards" style="margin-top:12px">
      <div class="card" data-meta="ticketMedio"><small>Ticket Médio</small><h3 onclick="startEditMeta(this.parentElement,'ticketMedio')" id="kpiTicket">N/D</h3></div>
      <div class="card" data-meta="totalClientes" style="border-left-color:#0d904f"><small>Total de Clientes</small><h3 onclick="startEditMeta(this.parentElement,'totalClientes')" id="kpiClientes">N/D</h3></div>
      <div class="card" data-meta="liquidez" style="border-left-color:#1a6e8e"><small>Liquidez</small><h3 onclick="startEditMeta(this.parentElement,'liquidez')" id="kpiLiquidez">N/D</h3></div>
      <div class="card" style="border-left-color:#d93025"><small>Faturamento Acumulado</small><h3 id="kpiFat">R$ 0,00</h3></div>
      <div class="card"><small>Total Tributos</small><h3 id="kpiTrib">R$ 0,00</h3></div>
      <div class="card"><small>Total Funcionários</small><h3 id="kpiFunc">0</h3></div>
    </div>

    <div class="tabs" style="margin:12px 0">
      <button class="tab active" onclick="switchTab('receitas',this)">Receitas</button><button class="tab" onclick="switchTab('tributos',this)">Tributos</button><button class="tab" onclick="switchTab('folha',this)">Folha de Pagamento</button><button class="tab" onclick="switchTab('trimestre',this)">Totais Trimestrais</button><button id="tabResumo" class="tab hidden" onclick="switchTab('resumo',this)">Resumo Empresas</button>
    </div>

    <div id="tabContent"></div>
    <div class="charts" style="margin-top:12px">
      <div class="panel"><canvas id="chartPie"></canvas></div><div class="panel"><canvas id="chartFat"></canvas></div><div class="panel"><canvas id="chartTrib"></canvas></div><div class="panel"><canvas id="chartLinha"></canvas></div>
    </div>
  </div>
</div><div id="toast" class="toast"></div>
<script>
let allData=[],companyMeta={},folhaExtra={},currentCompanyCode=null,viewMode='individual',activeTab='receitas',charts=[];
const N=(v,d=2)=>Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});
function parseNumeroBR(s){return parseFloat(String(s||'0').replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,''))||0}
function formatNumeroBR(v,d=2){return N(v,d)}
function formatCompetencia(c){const m=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];const [mm,aa]=String(c).split('/');return `${m[(+mm||1)-1]||mm}/${aa||''}`}
function getTrimestre(c){const mm=+String(c).split('/')[0];return `${Math.ceil(mm/3)}º Trimestre`}
function ordenarPorCompetencia(a){return a.sort((x,y)=>{const [mx,ax]=x.competencia.split('/').map(Number),[my,ay]=y.competencia.split('/').map(Number);return ax-ay||mx-my})}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2400)}
function normalizeHeader(s){return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')}
function handleFileSelect(event){try{const files=[...(event.target.files||event.dataTransfer.files||[])];if(!files.length)return;Promise.all(files.map(f=>new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res({name:f.name,text:fr.result});fr.onerror=rej;fr.readAsText(f)}))).then(items=>{const out=[];const tags=[];items.forEach(({name,text})=>{const doc=new DOMParser().parseFromString(text,'text/html');const table=[...doc.querySelectorAll('table')].find(t=>t.querySelector('th'));if(!table)throw new Error(`Arquivo ${name} sem tabela válida`);const th=[...table.querySelectorAll('th')];const map={};th.forEach((h,i)=>{let k=normalizeHeader(h.textContent);const alias={cod_emp:'codi_emp',codigo:'codi_emp',empresa:'nome_emp',nome:'nome_emp',mes:'competencia',comp:'competencia'};map[alias[k]||k]=i});[...table.querySelectorAll('tr')].forEach(tr=>{const td=[...tr.querySelectorAll('td')];if(td.length<4)return;const g=(k)=>map[k]!==undefined?(td[map[k]]?.textContent||'').trim():'';const r={codi_emp:g('codi_emp'),nome_emp:g('nome_emp')||'N/D',competencia:g('competencia'),saidas:parseNumeroBR(g('saidas')),servicos:parseNumeroBR(g('servicos')),outros:parseNumeroBR(g('outros')),pis:parseNumeroBR(g('pis')),cofins:parseNumeroBR(g('cofins')),icms:parseNumeroBR(g('icms')),sva:parseNumeroBR(g('sva')),livros:parseNumeroBR(g('livros')),scm:parseNumeroBR(g('scm')),irpj:parseNumeroBR(g('irpj')),csll:parseNumeroBR(g('csll')),difal:parseNumeroBR(g('difal'))};if(r.codi_emp&&/^\d{2}\/\d{4}$/.test(r.competencia))out.push(r)});const month=(out[0]?.competencia)||'Sem mês';tags.push(`<span class='tag'>${name} • ${month}</span>`)})
const uniq=new Map();[...allData,...out].forEach(r=>uniq.set(`${r.codi_emp}-${r.competencia}`,r));allData=[...uniq.values()];allData.forEach(r=>{companyMeta[r.codi_emp]=companyMeta[r.codi_emp]||{regime:'N/D',estado:'N/D',sistema:'N/D',ticketMedio:null,totalClientes:null,liquidez:null};folhaExtra[r.codi_emp]=folhaExtra[r.codi_emp]||[]});document.getElementById('fileTags').innerHTML=tags.join('');document.getElementById('dashboard').classList.remove('hidden');if(!currentCompanyCode)currentCompanyCode=getUniqueEmpresas()[0]?.codi_emp||null;updateAllViews();toast('Arquivos processados com sucesso');}).catch(e=>toast(e.message||'Erro no processamento'))}catch(e){toast('Falha no upload')}}
function resetAll(){allData=[];companyMeta={};folhaExtra={};currentCompanyCode=null;viewMode='individual';activeTab='receitas';destroyAllCharts();document.getElementById('dashboard').classList.add('hidden');document.getElementById('fileTags').innerHTML='';document.getElementById('infoBar').innerHTML='';toast('Dados reiniciados')}
function getUniqueEmpresas(){const m={};allData.forEach(r=>m[r.codi_emp]={codi_emp:r.codi_emp,nome_emp:r.nome_emp});return Object.values(m)}
function onCompanySearch(){const q=document.getElementById('companySearch').value.toLowerCase();const list=document.getElementById('companyList');const emps=getUniqueEmpresas().filter(e=>e.codi_emp.toLowerCase().includes(q)||e.nome_emp.toLowerCase().includes(q));list.innerHTML=`<div class='dd-item' onclick="selectCompany(null,'Todas as Empresas')">🏢 Todas as Empresas (Consolidado)</div>`+emps.map(e=>`<div class='dd-item' onclick="selectCompany('${e.codi_emp}','${e.nome_emp.replace(/'/g,"\\'")}')">${e.nome_emp} <span class='badge'>${e.codi_emp}</span></div>`).join('');list.classList.remove('hidden')}
function selectCompany(cod,nome){currentCompanyCode=cod;viewMode=cod?'individual':'consolidado';document.getElementById('companySearch').value=nome||'';document.getElementById('companyList').classList.add('hidden');updateAllViews()}
function setViewMode(mode){viewMode=mode;if(mode==='consolidado'){currentCompanyCode=null;activeTab='resumo'}else if(!currentCompanyCode){currentCompanyCode=getUniqueEmpresas()[0]?.codi_emp||null;activeTab='receitas'}updateAllViews()}
function switchTab(tabId,btn){activeTab=tabId;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');updateAllViews()}
function addFolhaRow(){if(!currentCompanyCode)return toast('Selecione uma empresa');const competencia=prompt('Competência (MM/AAAA):');const proventos=parseNumeroBR(prompt('Proventos:'));const numFunc=parseInt(prompt('Nº Funcionários:'),10)||0;if(!/^\d{2}\/\d{4}$/.test(competencia))return toast('Competência inválida');folhaExtra[currentCompanyCode].push({competencia,proventos,numFunc});updateAllViews()}
function startEditMeta(cardElement,metaKey){if(viewMode!=='individual'||!currentCompanyCode)return;const h=cardElement.querySelector('h3');const old=companyMeta[currentCompanyCode][metaKey];h.innerHTML=`<input type='number' step='any' style='width:100%'>`;const inp=h.querySelector('input');inp.value=old??'';inp.focus();const save=()=>{const v=inp.value.trim();companyMeta[currentCompanyCode][metaKey]=v===''?null:(metaKey==='totalClientes'?parseInt(v,10):parseFloat(v));updateAllViews()};inp.onblur=save;inp.onkeydown=(e)=>{if(e.key==='Enter')save();if(e.key==='Escape'){updateAllViews()}}
}
function groupByCompetencia(data){const m={};data.forEach(r=>{m[r.competencia]=m[r.competencia]||{...r};if(m[r.competencia]!==r){['saidas','servicos','outros','pis','cofins','icms','sva','livros','scm','irpj','csll','difal'].forEach(k=>m[r.competencia][k]+=r[k]||0)}});return ordenarPorCompetencia(Object.values(m))}
function updateAllViews(){const data=viewMode==='consolidado'?allData:allData.filter(r=>r.codi_emp===currentCompanyCode);const grouped=groupByCompetencia(data);const emps=getUniqueEmpresas();const months=[...new Set(allData.map(d=>d.competencia))].sort();document.getElementById('infoBar').innerHTML=`Meses carregados: ${months.join(', ')||'-'} | Registros: ${allData.length} | Empresas: ${emps.length}`;
const m=companyMeta[currentCompanyCode]||{regime:'N/D',estado:'N/D',sistema:'N/D',ticketMedio:null,totalClientes:null,liquidez:null};document.getElementById('metaRegime').textContent=`Regime: ${m.regime}`;document.getElementById('metaEstado').textContent=`Estado: ${m.estado}`;document.getElementById('metaSistema').textContent=`Sistema: ${m.sistema}`;
const fat=grouped.reduce((a,b)=>a+b.saidas,0), trib=grouped.reduce((a,b)=>a+b.pis+b.cofins+b.icms+b.irpj+b.csll,0), funcs=(folhaExtra[currentCompanyCode]||[]).reduce((a,b)=>a+b.numFunc,0)/Math.max((folhaExtra[currentCompanyCode]||[]).length,1);
const ticket=m.ticketMedio??(grouped.length?fat/grouped.length:null), clientes=m.totalClientes??null, liq=m.liquidez??(fat?((fat-trib)/fat*100):null);
document.getElementById('kpiTicket').textContent=ticket==null?'N/D':`R$ ${formatNumeroBR(ticket)}`;document.getElementById('kpiClientes').textContent=clientes==null?'N/D':clientes;document.getElementById('kpiLiquidez').textContent=liq==null?'N/D':formatNumeroBR(liq)+'%';document.getElementById('kpiFat').textContent=`R$ ${formatNumeroBR(fat)}`;document.getElementById('kpiTrib').textContent=`R$ ${formatNumeroBR(trib)}`;document.getElementById('kpiFunc').textContent=isFinite(funcs)?Math.round(funcs):0;
const tabResumo=document.getElementById('tabResumo');tabResumo.classList.toggle('hidden',viewMode!=='consolidado');if(viewMode==='consolidado'&&activeTab!=='resumo')activeTab='resumo';
renderTab(grouped);updateCharts(grouped,folhaExtra[currentCompanyCode]||[],viewMode==='consolidado')}
function renderTab(grouped){const el=document.getElementById('tabContent');if(activeTab==='folha'){const rows=(folhaExtra[currentCompanyCode]||[]);el.innerHTML=`<div class='panel'><button class='btn' onclick='addFolhaRow()'>Adicionar Linha de Folha</button><div class='table-wrap' style='margin-top:8px'><table><thead><tr><th>Mês</th><th>Total de Proventos</th><th>Nº Funcionários</th><th>Variação absoluta</th><th>Variação %</th></tr></thead><tbody>${rows.length?ordenarPorCompetencia(rows).map((r,i,a)=>{const p=a[i-1]?.proventos||0,v=r.proventos-p,pct=p?100*v/p:0;return `<tr><td>${formatCompetencia(r.competencia)}</td><td>R$ ${N(r.proventos)}</td><td>${r.numFunc}</td><td style='color:${v>=0?'var(--ok)':'var(--bad)'}'>R$ ${N(v)}</td><td style='color:${pct>=0?'var(--ok)':'var(--bad)'}'>${N(pct)}%</td></tr>`}).join(''):`<tr><td colspan='5'>Sem dados de folha.</td></tr>`}</tbody></table></div></div>`;return}
if(activeTab==='tributos'){el.innerHTML=`<div class='table-wrap'><table><thead><tr><th>Mês</th><th>DAS</th><th>COFINS</th><th>ICMS</th><th>IRPJ</th><th>CSLL</th><th>PIS</th><th>Total</th><th>Alíquota Efetiva %</th><th>Variação absoluta</th><th>Variação %</th></tr></thead><tbody>${grouped.map((r,i,a)=>{const total=r.pis+r.cofins+r.icms+r.irpj+r.csll,prev=(a[i-1]?.pis||0)+(a[i-1]?.cofins||0)+(a[i-1]?.icms||0)+(a[i-1]?.irpj||0)+(a[i-1]?.csll||0),v=total-prev,pct=prev?100*v/prev:0;return `<tr><td>${formatCompetencia(r.competencia)}</td><td>N/D</td><td>R$ ${N(r.cofins)}</td><td>R$ ${N(r.icms)}</td><td>R$ ${N(r.irpj)}</td><td>R$ ${N(r.csll)}</td><td>R$ ${N(r.pis)}</td><td>R$ ${N(total)}</td><td>${N(r.saidas?100*total/r.saidas:0)}%</td><td style='color:${v>=0?'var(--ok)':'var(--bad)'}'>R$ ${N(v)}</td><td style='color:${pct>=0?'var(--ok)':'var(--bad)'}'>${N(pct)}%</td></tr>`}).join('')}</tbody></table></div>`;return}
if(activeTab==='trimestre'){const q={};grouped.forEach(r=>{const k=getTrimestre(r.competencia);q[k]=q[k]||{fat:0,sva:0,livros:0,scm:0,serv:0,trib:0};q[k].fat+=r.saidas;q[k].sva+=r.sva;q[k].livros+=r.livros;q[k].scm+=r.scm;q[k].serv+=r.servicos;q[k].trib+=r.pis+r.cofins+r.icms+r.irpj+r.csll});const keys=Object.keys(q);const t=keys.reduce((a,k)=>({fat:a.fat+q[k].fat,sva:a.sva+q[k].sva,livros:a.livros+q[k].livros,scm:a.scm+q[k].scm,serv:a.serv+q[k].serv,trib:a.trib+q[k].trib}),{fat:0,sva:0,livros:0,scm:0,serv:0,trib:0});el.innerHTML=`<div class='table-wrap'><table><thead><tr><th>Trimestre</th><th>Faturamento</th><th>SVA</th><th>Livros</th><th>SCM</th><th>Serviço</th><th>Tributos</th><th>Alíquota</th></tr></thead><tbody>${keys.map(k=>`<tr><td>${k}</td><td>R$ ${N(q[k].fat)}</td><td>R$ ${N(q[k].sva)}</td><td>R$ ${N(q[k].livros)}</td><td>R$ ${N(q[k].scm)}</td><td>R$ ${N(q[k].serv)}</td><td>R$ ${N(q[k].trib)}</td><td>${N(q[k].fat?100*q[k].trib/q[k].fat:0)}%</td></tr>`).join('')}<tr><th>Total</th><th>R$ ${N(t.fat)}</th><th>R$ ${N(t.sva)}</th><th>R$ ${N(t.livros)}</th><th>R$ ${N(t.scm)}</th><th>R$ ${N(t.serv)}</th><th>R$ ${N(t.trib)}</th><th>${N(t.fat?100*t.trib/t.fat:0)}%</th></tr></tbody></table></div>`;return}
if(activeTab==='resumo'){const emps=getUniqueEmpresas().map(e=>{const d=groupByCompetencia(allData.filter(r=>r.codi_emp===e.codi_emp));const fat=d.reduce((a,b)=>a+b.saidas,0),sva=d.reduce((a,b)=>a+b.sva,0),scm=d.reduce((a,b)=>a+b.scm,0),trib=d.reduce((a,b)=>a+b.pis+b.cofins+b.icms+b.irpj+b.csll,0);return {...e,fat,sva,scm,trib,aliq:fat?100*trib/fat:0,meses:d.length}}).sort((a,b)=>b.fat-a.fat);const g=emps.reduce((a,b)=>({fat:a.fat+b.fat,sva:a.sva+b.sva,scm:a.scm+b.scm,trib:a.trib+b.trib,mes:a.mes+b.meses}),{fat:0,sva:0,scm:0,trib:0,mes:0});el.innerHTML=`<div class='table-wrap'><table><thead><tr><th>Código</th><th>Nome</th><th>Faturamento Total</th><th>SVA Total</th><th>SCM Total</th><th>Tributos Totais</th><th>Alíquota Efetiva %</th><th>Meses</th></tr></thead><tbody>${emps.map(e=>`<tr><td>${e.codi_emp}</td><td>${e.nome_emp}</td><td>R$ ${N(e.fat)}</td><td>R$ ${N(e.sva)}</td><td>R$ ${N(e.scm)}</td><td>R$ ${N(e.trib)}</td><td>${N(e.aliq)}%</td><td>${e.meses}</td></tr>`).join('')}<tr><th colspan='2'>Total Geral</th><th>R$ ${N(g.fat)}</th><th>R$ ${N(g.sva)}</th><th>R$ ${N(g.scm)}</th><th>R$ ${N(g.trib)}</th><th>${N(g.fat?100*g.trib/g.fat:0)}%</th><th>${g.mes}</th></tr></tbody></table></div>`;return}
el.innerHTML=`<div class='table-wrap'><table><thead><tr><th>Mês</th><th>Faturamento</th><th>SVA</th><th>Livros</th><th>SCM</th><th>Serviço</th><th>Variação absoluta</th><th>Variação %</th></tr></thead><tbody>${grouped.map((r,i,a)=>{const serv=r.servicos||Math.max(0,r.saidas-r.sva-r.livros-r.scm-r.outros),p=a[i-1]?.saidas||0,v=r.saidas-p,pct=p?100*v/p:0;return `<tr><td>${formatCompetencia(r.competencia)}</td><td>R$ ${N(r.saidas)}</td><td>R$ ${N(r.sva)} (${N(r.saidas?100*r.sva/r.saidas:0)}%)</td><td>R$ ${N(r.livros)} (${N(r.saidas?100*r.livros/r.saidas:0)}%)</td><td>R$ ${N(r.scm)} (${N(r.saidas?100*r.scm/r.saidas:0)}%)</td><td>R$ ${N(serv)} (${N(r.saidas?100*serv/r.saidas:0)}%)</td><td style='color:${v>=0?'var(--ok)':'var(--bad)'}'>R$ ${N(v)}</td><td style='color:${pct>=0?'var(--ok)':'var(--bad)'}'>${N(pct)}%</td></tr>`}).join('')}</tbody></table></div>`}
function destroyAllCharts(){charts.forEach(c=>c.destroy());charts=[]}
function updateCharts(data,folha,isConsolidado){destroyAllCharts();const labels=data.map(d=>formatCompetencia(d.competencia));const sum=(k)=>data.reduce((a,b)=>a+(b[k]||0),0);const serviços=sum('servicos')||Math.max(0,sum('saidas')-sum('sva')-sum('livros')-sum('scm')-sum('outros'));
charts.push(new Chart(chartPie,{type:'pie',data:{labels:['SVA','Livros','SCM','Serviços','Outros'],datasets:[{data:[sum('sva'),sum('livros'),sum('scm'),serviços,sum('outros')]}]}}));
charts.push(new Chart(chartFat,{type:'bar',data:{labels,datasets:[{label:'Faturamento',data:data.map(d=>d.saidas),backgroundColor:'#1a73e8'}]}}));
